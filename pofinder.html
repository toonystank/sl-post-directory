html, body {

.menu-toggle {

.tab {

iframe { width: 100%; height: 100%; border: none; }

.grid-ad-box {

.popup-button {

.popup-button span { display: block; font-size: 0.85rem; margin-top: 0.6rem; opacity: 0.9; }

.postage-slider-toggle {

</style>

<script>
let sliderButtonRestoreTimer;
let oppositeSliderButtonRestoreTimer;

function toggleSidebar(){
  document.querySelector('.tabs').classList.toggle('open');
}

function updateSliderButtonMode(activeTabId){
  const shouldMinimize = activeTabId !== 'tab1';
  document.body.classList.toggle('slider-buttons-minimized', shouldMinimize);
}

function temporarilyMinimizeSliderButtons(){
  if (!document.getElementById('tab1').classList.contains('active')) return;
  document.body.classList.add('slider-buttons-temporarily-minimized');
  clearTimeout(sliderButtonRestoreTimer);
  sliderButtonRestoreTimer = setTimeout(() => {
    document.body.classList.remove('slider-buttons-temporarily-minimized');
  }, 10000);
}

function temporarilyMinimizeOppositeSliderButton(source){
  document.body.classList.remove('minimize-postage-side-button', 'minimize-foreign-side-button');

  if(source === 'local-rate-typing'){
    document.body.classList.add('minimize-foreign-side-button');
  }

  if(source === 'foreign-rate-typing'){
    document.body.classList.add('minimize-postage-side-button');
  }

  clearTimeout(oppositeSliderButtonRestoreTimer);
  oppositeSliderButtonRestoreTimer = setTimeout(() => {
    document.body.classList.remove('minimize-postage-side-button', 'minimize-foreign-side-button');
  }, 10000);
}

function switchTab(id){
  // 1. Hide all tab content and clear active menu states
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  
  // 2. Show the selected tab
  const activeDiv = document.getElementById(id);
  activeDiv.classList.add('active');

  // 3. FIXED: Push ads after tab is visible
  const tabAds = activeDiv.querySelectorAll('.adsbygoogle');
  tabAds.forEach(ad => {
    // Check if the ad hasn't been initialized yet to avoid double loading
    if (!ad.getAttribute('data-adsbygoogle-status')) {
      try {
        (adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        console.error("AdSense load error:", e);
      }
    }
  });

  // 4. Highlight the current menu tab
  const clickedTab = Array.from(document.querySelectorAll('.tab')).find(tab => tab.getAttribute('onclick')?.includes(id));
  if(clickedTab) clickedTab.classList.add('active');

  // 5. Reload iframe to ensure content is fresh
  const ifr = activeDiv.querySelector('iframe');
  if(ifr) ifr.src = ifr.src;

  updateSliderButtonMode(id);
  document.body.classList.remove('slider-buttons-temporarily-minimized');
  clearTimeout(sliderButtonRestoreTimer);
  toggleSidebar();
}

function openPopup(){ window.open('colombo_areas_table.html','popup','width=900,height=600'); }

function togglePostageSlider(){
  const slider = document.getElementById('postageSlider');
  if(slider.classList.contains('open')){
    closePostageSlider();
  } else {
    openPostageSlider();
  }
}

function openPostageSlider(){
  const slider = document.getElementById('postageSlider');
  const overlay = document.getElementById('postageSliderOverlay');
  const toggle = document.getElementById('postageSliderToggle');
  closeForeignSlider();
  document.querySelector('.tabs').classList.remove('open');
  slider.classList.add('open');
  overlay.classList.add('open');
  toggle.classList.add('open');
  document.body.classList.add('postage-slider-active');
  document.body.classList.remove('foreign-slider-active');
  slider.setAttribute('aria-hidden', 'false');
  toggle.setAttribute('aria-expanded', 'true');
  toggle.setAttribute('title', 'Close postage calculator');
}

function closePostageSlider(){
  const slider = document.getElementById('postageSlider');
  const overlay = document.getElementById('postageSliderOverlay');
  const toggle = document.getElementById('postageSliderToggle');
  slider.classList.remove('open');
  overlay.classList.remove('open');
  toggle.classList.remove('open');
  document.body.classList.remove('postage-slider-active');
  slider.setAttribute('aria-hidden', 'true');
  toggle.setAttribute('aria-expanded', 'false');
  toggle.setAttribute('title', 'Open postage calculator');
}

function toggleForeignSlider(){
  const slider = document.getElementById('foreignSlider');
  if(slider.classList.contains('open')){
    closeForeignSlider();
  } else {
    openForeignSlider();
  }
}

function openForeignSlider(){
  const slider = document.getElementById('foreignSlider');
  const overlay = document.getElementById('postageSliderOverlay');
  const toggle = document.getElementById('foreignSliderToggle');
  closePostageSlider();
  document.querySelector('.tabs').classList.remove('open');
  slider.classList.add('open');
  overlay.classList.add('open');
  toggle.classList.add('open');
  document.body.classList.add('foreign-slider-active');
  document.body.classList.remove('postage-slider-active');
  slider.setAttribute('aria-hidden', 'false');
  toggle.setAttribute('aria-expanded', 'true');
  toggle.setAttribute('title', 'Close foreign rates');
}

function closeForeignSlider(){
  const slider = document.getElementById('foreignSlider');
  const overlay = document.getElementById('postageSliderOverlay');
  const toggle = document.getElementById('foreignSliderToggle');
  slider.classList.remove('open');
  toggle.classList.remove('open');
  document.body.classList.remove('foreign-slider-active');
  slider.setAttribute('aria-hidden', 'true');
  toggle.setAttribute('aria-expanded', 'false');
  toggle.setAttribute('title', 'Open foreign rates');
  if(!document.getElementById('postageSlider').classList.contains('open')){
    overlay.classList.remove('open');
  }
}

function closeSideSliders(){
  closePostageSlider();
  closeForeignSlider();
}

function normalizeSideSliders(){
  document.body.classList.remove('slider-buttons-temporarily-minimized', 'minimize-postage-side-button', 'minimize-foreign-side-button');
  clearTimeout(sliderButtonRestoreTimer);
  clearTimeout(oppositeSliderButtonRestoreTimer);

  const postageSlider = document.getElementById('postageSlider');
  const foreignSlider = document.getElementById('foreignSlider');
  const overlay = document.getElementById('postageSliderOverlay');
  const postageToggle = document.getElementById('postageSliderToggle');
  const foreignToggle = document.getElementById('foreignSliderToggle');
  const postageOpen = postageSlider.classList.contains('open');
  const foreignOpen = foreignSlider.classList.contains('open');

  overlay.classList.toggle('open', postageOpen || foreignOpen);
  document.body.classList.toggle('postage-slider-active', postageOpen);
  document.body.classList.toggle('foreign-slider-active', foreignOpen);
  postageSlider.setAttribute('aria-hidden', postageOpen ? 'false' : 'true');
  foreignSlider.setAttribute('aria-hidden', foreignOpen ? 'false' : 'true');
  postageToggle.setAttribute('aria-expanded', postageOpen ? 'true' : 'false');
  foreignToggle.setAttribute('aria-expanded', foreignOpen ? 'true' : 'false');
  postageToggle.setAttribute('title', postageOpen ? 'Close postage calculator' : 'Open postage calculator');
  foreignToggle.setAttribute('title', foreignOpen ? 'Close foreign rates' : 'Open foreign rates');

  const activeTab = document.querySelector('.tab-content.active');
  updateSliderButtonMode(activeTab ? activeTab.id : 'tab1');
}

document.addEventListener('keydown', function(event){
  if(event.key === 'Escape'){
    closeSideSliders();
  }
});

window.addEventListener('pageshow', function(){
  setTimeout(normalizeSideSliders, 0);
});

document.addEventListener('visibilitychange', function(){
  if(!document.hidden){
    normalizeSideSliders();
  }
});

window.addEventListener('message', function(event){
  if(event.data && event.data.type === 'main-search-typing'){
    temporarilyMinimizeSliderButtons();
  }
  if(event.data && (event.data.type === 'local-rate-typing' || event.data.type === 'foreign-rate-typing')){
    temporarilyMinimizeOppositeSliderButton(event.data.type);
  }
});

updateSliderButtonMode('tab1');
</script>

</body>
</html>
